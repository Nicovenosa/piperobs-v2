<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PiperObs MiniPlayer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0f1117;
    display:flex; justify-content:center; align-items:center;
    min-height:100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 40px;
  }
  .player {
    width: 720px; height: 100px;
    background: #141821;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
    position: relative; overflow: hidden;
  }
  .player::before {
    content: ''; position: absolute; top:0; left:0; right:0; height: 60px;
    background: linear-gradient(180deg, rgba(251,191,36,0.03), transparent);
    pointer-events: none;
  }

  .play-btn {
    width: 48px; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, #fbbf24, #d97706);
    border: none; display: grid; place-items: center;
    box-shadow: 0 4px 20px rgba(251,191,36,0.25);
    cursor: pointer; flex-shrink: 0;
  }

  .stop-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
    display: grid; place-items: center; cursor: pointer; flex-shrink: 0;
  }

  .waveform {
    flex: 1; height: 50px;
    display: flex; align-items: center; gap: 3px;
    position: relative;
  }
  .wave-bar {
    width: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.08);
    transition: height 0.3s ease;
  }
  .wave-bar.active {
    background: linear-gradient(180deg, #fbbf24, #f59e0b);
    box-shadow: 0 0 8px rgba(251,191,36,0.3);
  }

  .time-info {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    min-width: 70px;
  }
  .time-current { font-size: 16px; font-weight: 800; color: #fff; }
  .time-total { font-size: 13px; color: #475569; font-weight: 600; }

  .progress-track {
    position: absolute; bottom: 0; left: 20px; right: 60px; height: 4px;
    background: rgba(255,255,255,0.06); border-radius: 2px;
  }
  .progress-fill {
    position: absolute; top:0; left:0; height:100%; width: 42%;
    background: linear-gradient(90deg, #fbbf24, #f59e0b); border-radius: 2px;
  }
  .progress-thumb {
    position: absolute; top: -5px; left: 42%;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fbbf24; border: 2px solid #fff;
    box-shadow: 0 0 12px rgba(251,191,36,0.4);
    transform: translateX(-50%);
  }

  .close-btn {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    width: 28px; height: 28px; border-radius: 50%;
    background: transparent; border: none; color: #475569;
    font-size: 18px; cursor: pointer; display: grid; place-items: center;
    transition: color 0.15s;
  }
  .close-btn:hover { color: #fff; }
</style>
</head>
<body>
<div class="player">
  <button class="play-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="white">
      <rect x="4" y="3" width="3" height="10" rx="1"/>
      <rect x="9" y="3" width="3" height="10" rx="1"/>
    </svg>
  </button>

  <button class="stop-btn">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="#475569">
      <rect x="2" y="2" width="10" height="10" rx="2"/>
    </svg>
  </button>

  <div class="waveform" id="waveform"></div>

  <div class="time-info">
    <div class="time-current">02:34</div>
    <div class="time-total">/ 06:12</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill"></div>
    <div class="progress-thumb"></div>
  </div>

  <button class="close-btn">×</button>
</div>

<script>
  const bars = [0.3,0.5,0.8,0.4,0.9,0.6,0.3,0.7,1.0,0.5,0.4,0.8,0.6,0.3,0.5,0.9,0.7,0.4,0.6,0.8,0.5,0.3,0.7,0.9,0.4,0.6,0.5,0.8,0.7,0.3,0.5,0.9,0.6,0.4,0.8,0.5];
  const wf = document.getElementById('waveform');
  bars.forEach((h, i) => {
    const bar = document.createElement('div');
    bar.className = 'wave-bar' + (i < 18 ? ' active' : '');
    bar.style.height = (20 + h * 30) + 'px';
    wf.appendChild(bar);
  });
</script>
</body>
</html>
